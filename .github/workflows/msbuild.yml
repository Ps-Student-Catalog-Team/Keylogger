name: MSBuild

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  SOLUTION_FILE_PATH: .
  BUILD_CONFIGURATION: Release
  # 根据项目实际平台设置：x86-windows 或 x64-windows
  VCPKG_DEFAULT_TRIPLET: x86-windows
  VCPKG_ROOT: ${{ github.workspace }}\vcpkg

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup vcpkg
      run: |
        git clone https://github.com/Microsoft/vcpkg.git
        .\vcpkg\bootstrap-vcpkg.bat
        .\vcpkg\vcpkg integrate install

    - name: Install dependencies
      run: |
        .\vcpkg\vcpkg install curl jsoncpp --triplet ${{ env.VCPKG_DEFAULT_TRIPLET }}

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v1.0.2

    - name: Restore NuGet packages
      working-directory: ${{env.GITHUB_WORKSPACE}}
      run: nuget restore ${{env.SOLUTION_FILE_PATH}}

    - name: Build
      working-directory: ${{env.GITHUB_WORKSPACE}}
      run: |
        $projectFile = Get-ChildItem -Recurse -Filter "*.vcxproj" | Select-Object -First 1
        Write-Host "Building project: $projectFile"
        msbuild /m /p:Configuration=${{env.BUILD_CONFIGURATION}} $projectFile
