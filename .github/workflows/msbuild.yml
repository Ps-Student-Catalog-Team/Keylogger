name: MSBuild

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  SOLUTION_FILE_PATH: .
  BUILD_CONFIGURATION: Release
  # 根据项目实际平台修改：x86-windows 或 x64-windows
  VCPKG_DEFAULT_TRIPLET: x86-windows
  VCPKG_ROOT: ${{ github.workspace }}\vcpkg

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup vcpkg
      run: |
        git clone https://github.com/Microsoft/vcpkg.git
        .\vcpkg\bootstrap-vcpkg.bat
        .\vcpkg\vcpkg integrate install

    - name: Install dependencies
      run: |
        .\vcpkg\vcpkg install curl jsoncpp --triplet ${{ env.VCPKG_DEFAULT_TRIPLET }}

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v1.0.2

    - name: Restore NuGet packages
      working-directory: ${{env.GITHUB_WORKSPACE}}
      run: nuget restore ${{env.SOLUTION_FILE_PATH}}

    - name: Build
      working-directory: ${{env.GITHUB_WORKSPACE}}
      run: |
        # 根据 triplet 映射 MSBuild 平台
        if ("${{ env.VCPKG_DEFAULT_TRIPLET }}" -eq "x86-windows") { $platform = "Win32" }
        elseif ("${{ env.VCPKG_DEFAULT_TRIPLET }}" -eq "x64-windows") { $platform = "x64" }
        else { $platform = "" }
        if ($platform) {
          msbuild /m /p:Configuration=${{env.BUILD_CONFIGURATION}} /p:Platform=$platform ${{env.SOLUTION_FILE_PATH}}
        } else {
          msbuild /m /p:Configuration=${{env.BUILD_CONFIGURATION}} ${{env.SOLUTION_FILE_PATH}}
        }
